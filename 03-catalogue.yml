- name: catalogue app setup
  hosts: all
  become: yes
  tasks:
   - name: install mysql client
     ansible.builtin.dnf:
      name: mysql8.4
      state: present
   - name: install golang
     ansible.builtin.dnf:
      name: golang
      state: present
   - name: download catalogue source code
     ansible.builtin.get_url:
      url: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/catalogue.zip
      dest: /tmp/catalogue.zip
   - name: remove existing directory
     ansible.builtin.file:
      path: /app
      state: absent
   - name: create app directory to extract the src code
     ansible.builtin.file:
      path: /app
      state: directory
   - name: unarchive the sourcecode
     ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes
   - name: create appuser
     ansible.builtin.user:
      name: appuser
      shell: /bin/false
      system: yes
      state: present
   - name: install npm dependencies and build the application
     ansible.builtin.shell: |
      cd /app
      go mod tidy
      CGO_ENABLED=0 go build -o /app/catalogue .
      chown -R appuser:appuser /app
      chmod o-rwx /app -R
   - name: execute mysql script
     ansible.builtin.shell: |
      mysql -h mysql-dev.devaimlops.online -u root -pRoboShop@1 < /app/db/schema.sql
      mysql -h mysql-dev.devaimlops.online -u root -pRoboShop@1 < /app/db/app-user.sql
      mysql -h mysql-dev.devaimlops.online -u root -pRoboShop@1 catalogue < /app/db/master-data.sql 
   - name: check if systemd service file exists
     ansible.builtin.stat:
      path: /etc/systemd/system/catalogue.service
     register: service_file
   - name: remove existing systemd service file
     ansible.builtin.file:
      path: /etc/systemd/system/catalogue.service
      state: absent
     when: service_file.stat.exists
   - name: create systemd service file
     ansible.builtin.copy:
      dest: /etc/systemd/system/catalogue.service
      src: catalogue.service
   - name: reload systemd daemon
     ansible.builtin.systemd:
      daemon_reload: yes  
   - name: enable and start catalogue service
     ansible.builtin.systemd:
      name: catalogue
      state: started
      enabled: yes 
  