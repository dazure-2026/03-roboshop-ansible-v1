- name: cart setup
  hosts: all
  become: yes
  tasks:
    - name: install nodejs
      ansible.builtin.shell: 
        curl -fsSL https://rpm.nodesource.com/setup_20.x | bash - && dnf install -y nodejs
    - name: create appuser
      ansible.builtin.user:
        name: appuser
        shell: /bin/false
        system: yes
        state: present
    - name: remove existing app directory
      ansible.builtin.file:
        path: /app
        state: absent
    - name: create app directory if not exists
      ansible.builtin.file:
        path: /app
        state: directory
    - name: download app source code
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/cart.zip
        dest: /tmp/cart.zip
    - name: unarchive the source code to app directory
      ansible.builtin.unarchive:
        src: /tmp/cart.zip
        dest: /app
        remote_src: yes
    - name: install npm dependencies and build the application
      ansible.builtin.shell: |
        cd /app
        npm install 
        chown -R appuser:appuser /app
        chmod o-rwx /app -R
    - name: check if cart service file exists
      ansible.builtin.stat: 
        path: /etc/systemd/system/cart.service
      register: cart_service_file
    - name: remove existing cart service file
      ansible.builtin.file: 
        path: /etc/systemd/system/cart.service
        state: absent
      when: cart_service_file.stat.exists
    - name: copy cart service file
      ansible.builtin.copy: 
        dest: /etc/systemd/system/cart.service
        src: cart.service
    - name: daemon reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: yes
    - name: start cart service
      ansible.builtin.systemd_service:
        name: cart
        state: restarted
        enabled: yes