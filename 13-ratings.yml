- name: ratings setup
  hosts: all
  become: yes
  tasks:
    - name: install python3 and mysql client
      ansible.builtin.dnf:
        name: 
          - python3
          - python3-pip
          - mysql8.4
        state: present
    - name: download ratings source code
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/ratings.zip
        dest: /tmp/ratings.zip
    - name: remove existing app directory
      ansible.builtin.file:
        path: /app
        state: absent
    - name: create app directory if not exists
      ansible.builtin.file:
        path: /app
        state: directory
    - name: unarchive the source code to app directory
      ansible.builtin.unarchive:
        src: /tmp/ratings.zip
        dest: /app
        remote_src: yes
    - name: create appuser
      ansible.builtin.user:
        name: appuser
        shell: /bin/false
        system: yes
        state: present
    - name: install python dependencies
      ansible.builtin.shell: |
        mysql -h mysql-dev.devaimlops.online -u root -pRoboShop@1 < db/schema.sql
        mysql -h mysql-dev.devaimlops.online -u root -pRoboShop@1 < db/app-user.sql
        pip3 install -r /app/requirements.txt
        chown -R appuser:appuser /app
        chmod o-rwx /app -R
    - name: check if ratings service file exists
      ansible.builtin.stat:
        path: /etc/systemd/system/ratings.service
      register: ratings_service_file
    - name: remove existing ratings service file
      ansible.builtin.file:
        path: /etc/systemd/system/ratings.service
        state: absent
      when: ratings_service_file.stat.exists
    - name: copy ratings service file
      ansible.builtin.copy:
        dest: /etc/systemd/system/ratings.service
        src: ratings.service  
    - name: daemon reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: yes
    - name: start ratings service
      ansible.builtin.systemd_service:
        name: ratings
        state: restarted
        enabled: yes