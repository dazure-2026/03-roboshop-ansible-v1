- name: shipping setup
  hosts: all
  become: yes
  tasks:
    - name: install nodejs and npm
      ansible.builtin.dnf:
        name: 
          - java-21-openjdk 
          - java-21-openjdk-devel 
          - maven
          - mysql8.4
        state: present
    - name: download shipping source code
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/shipping.zip
        dest: /tmp/shipping.zip
    - name: remove existing app directory
      ansible.builtin.file:
        path: /app
        state: absent
    - name: create app directory if not exists
      ansible.builtin.file:
        path: /app
        state: directory
    - name: unarchive the source code to app directory
      ansible.builtin.unarchive:
        src: /tmp/shipping.zip
        dest: /app
        remote_src: yes
    - name: execute sql script to create database and tables
      ansible.builtin.shell: |
        mysql -h mysql-dev.devaimlops.online -u root -pRoboShop@1 < db/schema.sql
        mysql -h mysql-dev.devaimlops.online -u root -pRoboShop@1 < db/app-user.sql
    - name: create appuser
      ansible.builtin.user:
        name: appuser
        shell: /bin/false
        system: yes
        state: present
    - name: install maven dependencies and build the application
      ansible.builtin.shell: |
        cd /app
        mvn clean package -DskipTests
        cp target/shipping.jar /app/shipping.jar
        chown -R appuser:appuser /app
        chmod o-rwx /app -R
    - name: check if shipping service file exists
      ansible.builtin.stat: 
        path: /etc/systemd/system/shipping.service
      register: shipping_service_file 
    - name: remove existing shipping service file
      ansible.builtin.file: 
        path: /etc/systemd/system/shipping.service
        state: absent
      when: shipping_service_file.stat.exists
    - name: copy shipping service file
      ansible.builtin.copy: 
        dest: /etc/systemd/system/shipping.service
        src: shipping.service
    - name: daemon reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: yes
    - name: start shipping service
      ansible.builtin.systemd_service:
        name: shipping
        state: restarted
        enabled: yes